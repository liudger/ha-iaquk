---
name: "Python"

on:
  push:
  pull_request:
  schedule:
    - cron: "23 3 * * 1"

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.11.8"

jobs:
  quality:
    name: "Quality"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout the repository"
        uses: actions/checkout@v6

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: "Install uv"
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            requirements*.txt
            pyproject.toml
            .pre-commit-config.yaml

      - name: "Install dependencies"
        run: |
          uv pip install --system -r requirements-dev.txt
          echo '"""Stub."""' >custom_components/__init__.py

      - name: "Run hooks"
        run: |
          SKIP=pytest prek run --all-files
          ./scripts/check_dirty

      - name: "Prune uv cache"
        if: always()
        run: uv cache prune --ci

  tests:
    name: "Tests"
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout the repository"
        uses: actions/checkout@v6

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: "Install uv"
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            requirements*.txt
            pyproject.toml

      - name: "Install dependencies"
        run: |
          uv pip install --system -r requirements-test.txt pytest-xdist coveralls
          echo '"""Stub."""' >custom_components/__init__.py

      - name: "Run tests with coverage"
        run: |
          pytest --basetemp=$RUNNER_TEMP --durations=10 -n auto --dist=loadfile -qq -o console_output_style=count -p no:sugar --cov --cov-report=
          ./scripts/check_dirty

      - name: "Send coverage to Coveralls"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: coveralls --service=github

      - name: "Prune uv cache"
        if: always()
        run: uv cache prune --ci

  ty:
    name: "ty (advisory)"
    needs: quality
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: "Checkout the repository"
        uses: actions/checkout@v6

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: "Install uv"
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            requirements*.txt
            pyproject.toml

      - name: "Install dependencies"
        run: |
          uv pip install --system -r requirements-dev.txt
          echo '"""Stub."""' >custom_components/__init__.py

      - name: "Run ty"
        run: ty check --output-format github custom_components tests

      - name: "Prune uv cache"
        if: always()
        run: uv cache prune --ci
