repos:
  - repo: local
    hooks:
      - id: manifest
        name: Update manifest.json
        entry: scripts/run-in-env scripts/update_manifest
        language: system
        files: ^(custom_components/.+/const\.py|pyproject\.toml)$
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-format
        files: ^(custom_components|bin|tests)/.+\.py$
      - id: ruff
        args: [ --fix ]
        files: ^(custom_components|bin|tests)/.+\.py$
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: [ --py314-plus ]
        stages: [manual]
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args:
          - --quiet
          - --format=custom
          - --configfile=tests/bandit.yaml
        files: ^(custom_components|bin|tests)/.+\.py$
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-executables-have-shebangs
        stages: [manual]
      - id: check-json
        files: ^(custom_components|tests)/.+\.json$
      - id: trailing-whitespace
      # Uncomment lines below if you want to follow classical GitHub flow style development
#      - id: no-commit-to-branch
#        args:
#          - --branch=dev
  - repo: local
    hooks:
      # Run ty through our wrapper script in order to get the possible
      # pyenv and/or virtualenv activated; it may not have been e.g. if
      # committing from a GUI tool that was not launched from an activated
      # shell.
      - id: ty
        name: ty (advisory)
        entry: scripts/run-in-env ty check --exit-zero custom_components tests
        language: system
        pass_filenames: false
        always_run: true
        require_serial: true
      # Uncomment lines below to test code on every commit
      - id: pytest
        name: pytest
        entry: scripts/run-in-env pytest
        language: system
        pass_filenames: false
        always_run: true
